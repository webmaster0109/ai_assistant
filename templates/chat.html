<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{website_name}}</title>
  <link rel="shortcut icon" href="{{website_favicon}}" type="image/x-icon">
  <meta name="description" content="{{website_description}}">
  <meta name="author" content="Shrichand Thapa">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #151518;
      --surface2:  #1c1c20;
      --border:    #2a2a30;
      --accent:    #7c6aff;
      --accent2:   #a78bfa;
      --text:      #e8e8f0;
      --muted:     #6b6b7a;
      --user-col:  #6aff9c;
      --radius:    12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Code & table ─────────────────────────────── */
    pre {
      background: #0a0a0c;
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid var(--border); padding: 8px 10px; font-size: 0.9rem; }
    th { background: var(--surface2); color: var(--accent2); }

    /* ── Layout ───────────────────────────────────── */
    .app-layout {
      display: flex;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    /* ── Sidebar overlay (mobile) ─────────────────── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .sidebar-overlay.open { display: block; }

    /* ── Sidebar ──────────────────────────────────── */
    .sidebar {
      width: 270px;
      min-width: 270px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      overflow-y: auto;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 101;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .sidebar-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.04em;
    }

    #close-sidebar-btn {
      display: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    #new-chat-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 11px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s;
    }

    #new-chat-btn:hover { background: var(--accent2); }
    #new-chat-btn:active { transform: scale(0.97); }

    .sidebar-sessions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .sidebar-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.83rem;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s, color 0.15s;
      border: 1px solid transparent;
    }

    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active {
      background: rgba(124,106,255,0.15);
      color: var(--accent2);
      border-color: rgba(124,106,255,0.3);
    }

    /* ── Main area ────────────────────────────────── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Topbar (mobile hamburger) ────────────────── */
    .topbar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #hamburger-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent2);
    }

    /* ── Chat box ─────────────────────────────────── */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 12px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user-message {
      color: var(--user-col);
      margin-bottom: 10px;
      font-size: 0.9rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.4px;
    }

    .ai-message {
      color: var(--text);
      line-height: 1.75;
      font-size: 0.93rem;
    }

    .ai-message p {
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .ai-message p:last-child { margin-bottom: 0; }

    .ai-message h1,
    .ai-message h2,
    .ai-message h3,
    .ai-message h4 {
      margin: 18px 0 8px 0;
      line-height: 1.3;
    }

    .ai-message ol {
      list-style-type: decimal;
      padding-left: 22px;
      margin: 14px 0 10px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ai-message ul {
      list-style-type: disc;
      padding-left: 22px;
      margin: 14px 0 10px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ai-message li {
      line-height: 1.7;
      color: var(--text);
      display: list-item;
    }

    .ai-message a {
      color: var(--text);
      text-decoration: underline;
    }

    /* ── Input form ───────────────────────────────── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    #message {
      flex: 1;
      min-width: 0;
      padding: 11px 16px;
      border-radius: 25px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #message:focus { border-color: var(--accent); }
    #message::placeholder { color: var(--muted); }
    #message:disabled { opacity: 0.5; }

    #model {
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      max-width: 150px;
    }

    #send-btn {
      padding: 11px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(0.96); }

    /* ── Popup ────────────────────────────────────── */
    .popup-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .popup-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 28px;
      border-radius: 16px;
      width: 100%;
      max-width: 340px;
      position: relative;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .cancel-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .cancel-btn:hover { color: var(--text); }

    /* ── MOBILE BREAKPOINT ────────────────────────── */
    @media (max-width: 768px) {

      .topbar { display: flex; }

      #close-sidebar-btn { display: block; }

      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100dvh;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }

      .sidebar.open { transform: translateX(0); }

      .input-row {
        padding: 10px 12px;
        gap: 6px;
      }

      #model {
        width: 100%;
        max-width: 100%;
        order: -1;  /* model select goes above message input on mobile */
      }

      #message { min-width: 0; }

      #send-btn { width: 100%; justify-content: center; }

      .chat-box { padding: 12px; }

      .chat-container { padding: 12px 14px; }
    }

    @media (max-width: 400px) {
      .sidebar { width: 85vw; }
    }
  </style>

</head>
<body>
 <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="app-layout">

    <!-- ── Sidebar ────────────────────────────── -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">{{website_name}}</span>
        <button id="close-sidebar-btn" onclick="closeSidebar()">✕</button>
      </div>

      <button id="new-chat-btn" onclick="startNewChat()">+ New Chat</button>

      <div id="sidebar-sessions" class="sidebar-sessions"></div>
    </div>

    <!-- ── Main area ──────────────────────────── -->
    <div class="main-area">

      <!-- Mobile topbar -->
      <div class="topbar">
        <button id="hamburger-btn" onclick="openSidebar()">☰</button>
        <span class="topbar-title">Rafat GenAI</span>
      </div>

      <div class="chat-box">
        <div class="chat-message" id="chat-message"></div>
      </div>

      <form method="post" action="{% url 'chat' %}" id="chat-form">
        {% csrf_token %}
        <div class="input-row">
          <select name="model" id="model">
            <option value="glm-5">GLM 5</option>
            <option value="glm-4.7">GLM 4.7</option>
            <option value="gpt-oss">GPT OSS</option>
            <option value="qwen3.5">Qwen 3.5</option>
            <option value="deepseek-v3.2">DeepSeek V3.2</option>
            <option value="deepseek-v3.1">DeepSeek V3.1</option>
            <option value="nemotron-3-super">Nemotron 3 Super</option>
            <option value="minimax-m2.7">Minimax M2.7</option>
          </select>
          <input type="text" name="message" id="message"
            placeholder="Type your questions..." autocomplete="off" />
          <button type="submit" id="send-btn">&uarr;</button>
        </div>
      </form>

    </div>
  </div>

    <!-- ── Popup ──────────────────────────────────── -->
    <div class="popup-dialog" id="popup-dialog" style="display:none;">
      <div class="popup-inner">
        <button class="cancel-btn" id="cancel-btn">⨂</button>
        <div class="popup-content" id="popup-content"></div>
      </div>
    </div>

  <script>
    const chatBox = document.querySelector('#chat-message');
    const form = document.querySelector('#chat-form');

    let currentSessionId = localStorage.getItem('currentSessionId') || null;

    function openSidebar() {
        document.querySelector('#sidebar').classList.add('open');
        document.querySelector('#sidebar-overlay').classList.add('open');
    }

    function closeSidebar() {
        document.querySelector('#sidebar').classList.remove('open');
        document.querySelector('#sidebar-overlay').classList.remove('open');
    }

    // ── Sidebar ───────────────────────────────────────────────────
    function addSidebarSession(title, sessionId) {
        const sidebar = document.querySelector('#sidebar-sessions');
        if (!sidebar) return;

        // Avoid duplicates
        if (sidebar.querySelector(`[data-session-id="${sessionId}"]`)) return;

        const item = document.createElement('div');
        item.classList.add('sidebar-item');
        item.dataset.sessionId = sessionId;
        item.textContent = title || 'Untitled';

        if (sessionId === currentSessionId) item.classList.add('active');

        item.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            closeSidebar();
            loadSession(sessionId);
        });

        sidebar.prepend(item);
    }

    // ── Load all sessions into sidebar on page load ───────────────
    async function loadAllSessions() {
        try {
            const response = await fetch('/chat/sessions/');
            if (!response.ok) throw new Error(`Sessions fetch failed: ${response.status}`);
            const sessions = await response.json();
            sessions.reverse().forEach(s => addSidebarSession(s.title, s.id));

            // Restore last active session
            if (currentSessionId) loadSession(currentSessionId);
            
        } catch (err) {
            console.error('[loadAllSessions] Failed:', err);
        }
    }

    // ── Helpers ───────────────────────────────────────────────────
    function clearChatWindow() {
        chatBox.innerHTML = '';
    }

    function createChatContainer() {
        const container = document.createElement('div');
        container.classList.add('chat-container');
        chatBox.appendChild(container);
        return container;
    }

    function appendMessages(userMessage, aiMessage, modelName) {
        const container = createChatContainer();

        const userMsg = document.createElement('p');
        userMsg.classList.add('user-message');
        userMsg.innerHTML = `<strong>USER: </strong>${userMessage}`;

        const aiMsg = document.createElement('div');
        aiMsg.classList.add('ai-message');
        aiMsg.innerHTML = `<strong>${modelName || 'AI'}:</strong> ${aiMessage}`;

        container.appendChild(userMsg);
        container.appendChild(aiMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showLoading() {
        removeLoading();
        const loader = document.createElement('div');
        loader.id = 'loading-indicator';
        loader.classList.add('chat-container');
        loader.innerHTML = '<em style="color:#888;">Rafat GenAI is thinking...</em>';
        chatBox.appendChild(loader);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeLoading() {
        const loader = document.querySelector('#loading-indicator');
        if (loader) loader.remove();
    }

    // ── New chat ──────────────────────────────────────────────────
    function startNewChat() {
        currentSessionId = null;
        localStorage.removeItem('currentSessionId');
        clearChatWindow();
        closeSidebar();
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    }

    // ── Send message ──────────────────────────────────────────────
    form.addEventListener('submit', sendMessage);

    async function sendMessage(e) {
        e.preventDefault();

        const messageInput = document.querySelector('#message');
        const message = messageInput.value.trim();
        const popupDialog = document.querySelector('#popup-dialog');
        const popupContent = document.querySelector('#popup-content');
        const cancelBtn = document.querySelector('#cancel-btn');

        if (!message) {
            popupDialog.style.display = 'flex';
            popupContent.innerHTML = "<p>Please enter a message first.</p>";
            cancelBtn.onclick = () => popupDialog.style.display = 'none';
            return;
        }

        const csrf_token = document.querySelector('input[name="csrfmiddlewaretoken"]').value;
        const model = document.querySelector('#model').value;
        const url = "{% url 'chat_post' %}";

        messageInput.disabled = true;
        showLoading();

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'X-CSRFToken': csrf_token },
                body: new URLSearchParams({
                    message,
                    model,
                    session_id: currentSessionId || "",
                    csrfmiddlewaretoken: csrf_token,
                }),
            });

            const result = await response.json();
            removeLoading();

            console.log('[sendMessage] result:', result); // ← debug

            if (response.ok) {
                if (!currentSessionId) {
                    currentSessionId = result.session_id;
                    localStorage.setItem('currentSessionId', currentSessionId);
                    addSidebarSession(result.title, result.session_id);
                }
                appendMessages(result.user_message, result.ai_message, result.model);
                messageInput.value = '';
            } else {
                console.error('[sendMessage] Server error:', result);
            }
        } catch (err) {
            removeLoading();
            console.error('[sendMessage] Fetch failed:', err);
        } finally {
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    // ── Load session history ──────────────────────────────────────
    async function loadSession(sessionId) {
        currentSessionId = sessionId;
        localStorage.setItem('currentSessionId', sessionId);
        clearChatWindow();
        showLoading();

        try {
            const response = await fetch(`/chat/history/${sessionId}/`);
            if (!response.ok) throw new Error(`History fetch failed: ${response.status}`);

            const conversations = await response.json();
            removeLoading();

            console.log('[loadSession] conversations:', conversations); // ← debug

            if (conversations.length === 0) {
                chatBox.innerHTML = '<p style="color:#666; padding:20px;">No messages yet.</p>';
                return;
            }

            conversations.forEach(chat => appendMessages(
                chat.user_message,
                chat.ai_message,
                chat.session__model,
            ));
            
        } catch (err) {
            removeLoading();
            console.error('[loadSession] Failed:', err);
        }
    }

    // ── Init — runs immediately since script is at bottom of body ─
    loadAllSessions();
  </script>

</body>
</html>
