<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{website_name}}</title>
    <link rel="shortcut icon" href="{{website_favicon}}" type="image/x-icon" />
    <meta name="description" content="{{website_description}}" />
    <meta name="author" content="Shrichand Thapa" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/media/css/style.css" />
    <style>
      #mic-btn {
        padding: 10px 12px;
        background: var(--surface2);
        color: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        font-size: 1rem;
        transition:
          background 0.2s,
          transform 0.1s;
        flex-shrink: 0;
      }

      #mic-btn:hover {
        background: var(--border);
      }
      #mic-btn.recording {
        background: rgba(220, 38, 38, 0.2);
        border-color: #dc2626;
        color: #dc2626;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
        }
        50% {
          transform: scale(1.08);
          box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
        }
      }
    </style>
  </head>
  <body>
    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      onclick="closeSidebar()"
    ></div>

    <div class="app-layout">
      <!-- ── Sidebar ────────────────────────────── -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">{{website_name}}</span>
          <button id="close-sidebar-btn" onclick="closeSidebar()">✕</button>
        </div>
        <button id="new-chat-btn" onclick="startNewChat()">+ New Chat</button>

        <div id="sidebar-sessions" class="sidebar-sessions"></div>

        <!-- ── Usage Panel — bottom ── -->
        <div class="usage-panel" id="usage-panel">
          <div class="usage-title">⚡ Cloud Usage</div>
          <div class="usage-row">
            <span class="usage-label">Input Tokens</span>
            <span class="usage-value" id="usage-input">—</span>
          </div>
          <div class="usage-row">
            <span class="usage-label">Output Tokens</span>
            <span class="usage-value" id="usage-output">—</span>
          </div>
          <div class="usage-divider"></div>
          <div class="usage-row">
            <span class="usage-label">Total Tokens</span>
            <span class="usage-value usage-total" id="usage-total">—</span>
          </div>
        </div>
      </div>

      <!-- ── Main area ──────────────────────────── -->
      <div class="main-area">
        <!-- Mobile topbar -->
        <div class="topbar">
          <button id="hamburger-btn" onclick="openSidebar()">☰</button>
          <span class="topbar-title">{{website_name}}</span>
        </div>

        <div class="chat-box">
          <div class="chat-message" id="chat-message"></div>
        </div>

        <form method="post" id="chat-form">
          {% csrf_token %}
          <div class="input-row">
            <select name="model" id="model">
              <option value="glm-5">GLM 5 🎨</option>
              <option value="glm-4.7">GLM 4.7</option>
              <option value="gemini-3-flash-preview">Gemini 3 Flash 🎨</option>
              <option value="gpt-oss">GPT OSS</option>
              <option value="gemma3">Gemma 3 🎨</option>
              <option value="qwen3.5">Qwen 3.5</option>
              <option value="kimi-k2.5">Kimi-k2.5</option>
              <option value="deepseek-v3.2">DeepSeek V3.2</option>
              <option value="deepseek-v3.1">DeepSeek V3.1</option>
              <option value="nemotron-3-super">Nemotron 3 Super</option>
              <option value="minimax-m2.7">Minimax M2.7</option>
            </select>
            <input
              type="text"
              name="message"
              id="message"
              placeholder="type or speak..."
              autocomplete="off"
            />
            <button type="button" id="mic-btn" title="Voice Input">
              <i class="bi bi-mic"></i>
            </button>
            <button type="submit" id="send-btn">&uarr;</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Popup ──────────────────────────────────── -->
    <div class="popup-dialog" id="popup-dialog" style="display: none">
      <div class="popup-inner">
        <button class="cancel-btn" id="cancel-btn">⨂</button>
        <div class="popup-content" id="popup-content"></div>
      </div>
    </div>

    <div
      class="confirm-overlay"
      id="confirm-overlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.75);
        align-items: center;
        justify-content: center;
        z-index: 99999;
        padding: 20px;
        backdrop-filter: blur(4px);
      "
    >
      <div
        class="confirm-box"
        style="
          background: #1c1c20;
          border: 1px solid #2a2a30;
          border-radius: 16px;
          padding: 28px 24px;
          width: 100%;
          max-width: 320px;
          text-align: center;
          display: flex;
          flex-direction: column;
          gap: 14px;
          box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        "
      >
        <div class="confirm-icon" style="font-size: 2.4rem; line-height: 1">
          🗑️
        </div>
        <h3
          class="confirm-title"
          style="
            font-family: &quot;Syne&quot;, sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e8e8f0;
            margin: 0;
          "
        >
          Delete Session?
        </h3>
        <p
          class="confirm-message"
          style="
            font-size: 0.85rem;
            color: #6b6b7a;
            line-height: 1.6;
            margin: 0;
          "
        ></p>
        <div
          class="confirm-actions"
          style="display: flex; gap: 10px; margin-top: 4px"
        >
          <button
            id="confirm-cancel-btn"
            style="
              flex: 1;
              padding: 11px;
              border-radius: 10px;
              border: 1px solid #2a2a30;
              background: #1c1c20;
              color: #e8e8f0;
              font-family: &quot;Syne&quot;, sans-serif;
              font-size: 0.88rem;
              font-weight: 600;
              cursor: pointer;
            "
          >
            Cancel
          </button>
          <button
            id="confirm-delete-btn"
            style="
              flex: 1;
              padding: 11px;
              border-radius: 10px;
              border: none;
              background: #dc2626;
              color: #fff;
              font-family: &quot;Syne&quot;, sans-serif;
              font-size: 0.88rem;
              font-weight: 600;
              cursor: pointer;
            "
          >
            Delete
          </button>
        </div>
      </div>
    </div>
    <script src="/media/js/usage.js"></script>
    <script src="/media/js/delete-sessions.js"></script>
    <script src="/media/js/ollama.js"></script>

    <script>
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        console.warn("Your browser does not support Speech Recognition.");
      } else {
        const recognition = new SpeechRecognition();
        recognition.lang = "en-IN";
        recognition.continuous = false;
        recognition.interimResults = false;

        // 1. Target the button
        let micBtn = document.getElementById("mic-btn");

        // 2. STRIP EXISTING LISTENERS: Clone the button and replace it.
        const newMicBtn = micBtn.cloneNode(true);
        micBtn.parentNode.replaceChild(newMicBtn, micBtn);
        micBtn = newMicBtn;

        micBtn.dataset.listening = "false";

        micBtn.addEventListener("click", () => {
          micBtn.disabled = true;
          setTimeout(() => (micBtn.disabled = false), 500);

          if (micBtn.dataset.listening === "true") {
            try {
              recognition.stop();
            } catch (e) {}
          } else {
            try {
              recognition.start();
            } catch (err) {
              // 4. GRACEFUL FALLBACK: If the browser complains it's already running, just sync our UI to match the browser's reality.
              if (err.name === "InvalidStateError") {
                micBtn.dataset.listening = "true";
                micBtn.innerHTML = "<i class='bi bi-mic-fill'></i>";
                micBtn.style.color = "#dc2626";
                micBtn.classList.add('recording');
                console.warn(
                  "Ignored double-start. Audio engine is already running.",
                );
              } else {
                console.error("Start error:", err);
              }
            }
          }
        });

        recognition.onstart = () => {
          micBtn.dataset.listening = "true";
          micBtn.innerHTML = "<i class='bi bi-mic-fill'></i>";
          micBtn.style.color = "#dc2626";
          micBtn.classList.add('recording');
        };

        recognition.onresult = (e) => {
          const transcript = Array.from(e.results)
            .map((r) => r[0].transcript)
            .join("");
          // console.log("Recognized Text:", transcript);
          document.querySelector("#message").value = transcript;
        };

        recognition.onend = () => {
          micBtn.dataset.listening = "false";
          micBtn.innerHTML = "<i class='bi bi-mic'></i>";
          micBtn.style.color = "";
          micBtn.classList.remove('recording');
        };

        recognition.onerror = (e) => {
          micBtn.dataset.listening = "false";
          micBtn.innerHTML = "<i class='bi bi-mic'></i>";
          micBtn.style.color = "";
          micBtn.classList.remove('recording');

          // We ignore "no-speech" errors from creating a popup, as it just means the user was quiet
          if (e.error !== "no-speech") {
            console.error("Voice error:", e.error);
          }
        };
      }
    </script>

  </body>
</html>
