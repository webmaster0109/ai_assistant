{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ website_name }}</title>
    <meta name="description" content="{{ website_description }}" />
    <meta name="author" content="Shrichand Thapa" />
    <meta name="theme-color" content="#17594a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="{{ website_name }}" />
    <meta name="application-name" content="{{ website_name }}" />
    <meta name="msapplication-TileColor" content="#17594a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link
      rel="apple-touch-icon"
      href="{% if website_favicon %}{{ website_favicon }}{% else %}{% static 'frontend/pwa-icon.svg' %}{% endif %}"
    />
    <link
      id="app-favicon"
      rel="icon"
      type="{% if website_favicon %}image/x-icon{% else %}image/svg+xml{% endif %}"
      href="{% if website_favicon %}{{ website_favicon }}{% else %}{% static 'frontend/pwa-icon.svg' %}{% endif %}"
    />
    <link
      rel="shortcut icon"
      href="{% if website_favicon %}{{ website_favicon }}{% else %}{% static 'frontend/pwa-icon.svg' %}{% endif %}"
      type="{% if website_favicon %}image/x-icon{% else %}image/svg+xml{% endif %}"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <link rel="stylesheet" href="{% static 'frontend/assets/app.css' %}" />
  </head>
  <body>
    <div
      id="root"
      data-site-name="{{ website_name|escape }}"
      data-site-description="{{ website_description|escape }}"
      data-site-favicon="{{ website_favicon|default:''|escape }}"
    ></div>
    <script type="module" src="{% static 'frontend/assets/app.js' %}"></script>
  </body>
</html>
